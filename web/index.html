<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Nightly static report website for stock and options screening."
    />
    <title>Stock Analysis Report</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div class="dashboard-shell">
        <header class="masthead newsprint-texture">
          <div class="masthead-rule"></div>
          <div class="masthead-topline">
            <span>Vol. 1</span>
            <span>Loading edition&hellip;</span>
          </div>
          <div class="masthead-title-row">
            <p class="masthead-kicker">Nightly market plan</p>
            <h1>Stock<br>Analysis</h1>
            <p class="masthead-stamp">Printed for the next session</p>
          </div>
          <div class="masthead-bottomline">
            <span>Fetching latest report&hellip;</span>
          </div>
        </header>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
